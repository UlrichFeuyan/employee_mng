{% extends "base.html" %}
{% load static %}

{% block content %}
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {{form.nom}}
        {{form.email}}
        {{form.poste}}
        {{form.salaire}}
        <div class="space-x-2">
            <button type="submit" class="btn btn-primary">Enregistrer</button>
            <a href="{% url 'employee:list_employee' %}" class="btn btn-primary btn-soft">Annuler</a>
        </div>
    </form>
{% endblock content %}
